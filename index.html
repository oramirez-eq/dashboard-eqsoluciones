    // ── AUTH MICROSOFT ────────────────────────────────────────────────────────
    async function msalLogin() {
      const authUrl = `https://login.microsoftonline.com/${MSAL_CONFIG.tenantId}/oauth2/v2.0/authorize`
        + `?client_id=${MSAL_CONFIG.clientId}`
        + `&response_type=token`
        + `&redirect_uri=${encodeURIComponent(MSAL_CONFIG.redirectUri)}`
        + `&scope=${encodeURIComponent(GRAPH_SCOPES.join(" "))}`
        + `&response_mode=fragment`
        + `&nonce=${Math.random().toString(36).slice(2)}`;
      return new Promise((resolve, reject) => {
        const popup = window.open(authUrl, "msalLogin", "width=500,height=650");
        const timer = setInterval(() => {
          try {
            if (popup.closed) { clearInterval(timer); reject(new Error("Popup cerrado")); return; }
            const hash = popup.location.hash;
            if (hash && hash.includes("access_token")) {
              clearInterval(timer); popup.close();
              const params = new URLSearchParams(hash.slice(1));
              resolve(params.get("access_token"));
            }
          } catch(_) {}
        }, 300);
      });
    }

    async function readExcelKPI(token, area, fileName) {
      // Acceder al OneDrive de fscavone via /users/{email}/drive
      const basePath = AREA_PATHS[area];
      if (!basePath) throw new Error(`Ruta de ${area} no configurada aún`);

      const filePath  = `${basePath}/${fileName}.xlsx`;
      const driveUrl  = `${GRAPH_BASE}/users/${encodeURIComponent(DRIVE_OWNER)}/drive/root:${encodeURIComponent(filePath)}`;
      const itemRes   = await fetch(driveUrl, { headers:{ Authorization:`Bearer ${token}` } });
      if (!itemRes.ok) {
        const err = await itemRes.json().catch(()=>({}));
        throw new Error(`No encontrado: ${fileName}.xlsx — ${err?.error?.message||itemRes.status}`);
      }
      const item = await itemRes.json();

      // Leer rango usado de Hoja1
      // Estructura esperada: Col A=Mes, Col B=Valor, Col C=Meta
      const rangeUrl  = `${GRAPH_BASE}/users/${encodeURIComponent(DRIVE_OWNER)}/drive/items/${item.id}/workbook/worksheets/Hoja1/usedRange`;
      const rangeRes  = await fetch(rangeUrl, { headers:{ Authorization:`Bearer ${token}` } });
      if (!rangeRes.ok) throw new Error(`Error leyendo contenido de: ${fileName}`);
      const range     = await rangeRes.json();
      const rows      = (range.values||[]).slice(1).filter(r => r[0] && r[1] !== undefined);
      const trend     = rows.map(r => parseFloat(r[1])||0);
      const valor     = trend[trend.length-1] ?? 0;
      const meta      = parseFloat(rows[rows.length-1]?.[2]) || 0;
      const inv       = ["LKM Confiabilidad Internet","Lead_Time_Impuestos","Lead_Time_Compras",
                         "Tiempos_Contratacion","Sobretiempos","Rotacion",
                         "Cartera_Vencida","Obsolescencias","Inventario","Evolucion_Cartera"];
      const pct       = inv.includes(fileName) ? (meta/valor) : (valor/meta);
      const semaforo  = pct >= 1 ? "verde" : pct >= 0.9 ? "amarillo" : "rojo";
      return { ...KPI_META[fileName], valor, meta, trend, semaforo };
    }

          </div>
          <div style={{background:"#FFF",border:`1px solid ${EQ.azulBorde}`,borderRadius:14,padding:"20px 24px",boxShadow:"0 1px 4px rgba(27,46,75,0.06)"}}>
            <div style={{color:EQ.grisMedio,fontSize:11,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:18}}>Distribución de Indicadores por Área</div>
            <div style={{height:220}}>
              <ResponsiveContainer width="100%" height="100%">
                <BarChart data={barData} barSize={15} barCategoryGap="30%">
                  <CartesianGrid strokeDasharray="3 3" stroke={EQ.azulBorde} vertical={false}/>
                  <XAxis dataKey="area" tick={{fill:EQ.grisMedio,fontSize:12}} axisLine={false} tickLine={false}/>
                  <YAxis tick={{fill:EQ.grisMedio,fontSize:11}} axisLine={false} tickLine={false}/>
                  <Tooltip contentStyle={{background:"#FFF",border:`1px solid ${EQ.azulBorde}`,borderRadius:8,color:EQ.azulOscuro}} cursor={{fill:EQ.turquesaGlow}}/>
                  <Bar dataKey="En Meta" fill={EQ.verde}    radius={[4,4,0,0]}/>
                  <Bar dataKey="Alerta"  fill={EQ.amarillo} radius={[4,4,0,0]}/>
                  <Bar dataKey="Crítico" fill={EQ.rojo}     radius={[4,4,0,0]}/>
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>
        </div>
      );
    }

    // ── VISTA POR ÁREA ────────────────────────────────────────────────────────
    function AreaView({area, kpis}) {
      const v=kpis.filter(k=>k.semaforo==="verde").length;
      const a=kpis.filter(k=>k.semaforo==="amarillo").length;
      const r=kpis.filter(k=>k.semaforo==="rojo").length;
      return (
        <div style={{display:"flex",flexDirection:"column",gap:22}}>
          <div style={{display:"flex",alignItems:"center",gap:14,borderBottom:`1px solid ${EQ.azulBorde}`,paddingBottom:18}}>
            <div style={{width:48,height:48,background:EQ.turquesaGlow,border:`2px solid ${EQ.turquesa}`,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>
              {areaIcons[area]}
            </div>
            <div>
              <div style={{fontSize:22,fontWeight:800,color:EQ.azulOscuro}}>{area}</div>
              <div style={{color:EQ.grisMedio,fontSize:12}}>{kpis.length} indicadores · datos en tiempo real</div>
            </div>
            <div style={{marginLeft:"auto",display:"flex",gap:20}}>
              {[{l:"OK",val:v,c:EQ.verde},{l:"Alerta",val:a,c:EQ.amarillo},{l:"Crítico",val:r,c:EQ.rojo}].map(m=>(
                <div key={m.l} style={{textAlign:"center"}}>
                  <div style={{fontSize:26,fontWeight:900,color:m.c,fontFamily:"monospace"}}>{m.val}</div>
                  <div style={{fontSize:10,color:EQ.grisMedio,textTransform:"uppercase"}}>{m.l}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:14}}>
            {kpis.map(k=><KPICard key={k.id} kpi={k}/>)}
          </div>
        </div>
      );
    }

    // ── APP PRINCIPAL ─────────────────────────────────────────────────────────
    function App() {
      const [activeArea,  setActiveArea]  = useState("Gerencial");
      const [token,       setToken]       = useState(null);
      const [usuario,     setUsuario]     = useState("");
      const [kpiData,     setKpiData]     = useState(DEMO_DATA);
      const [loadingAuth, setLoadingAuth] = useState(false);
      const [loadingData, setLoadingData] = useState(false);
      const [error,       setError]       = useState(null);
      const [ultimaSync,  setUltimaSync]  = useState(null);
      const [esDemo,      setEsDemo]      = useState(true);

      const cargarDatosOneDrive = useCallback(async (accessToken) => {
        setLoadingData(true); setError(null);
        try {
          const nuevos = {};
          for (const [area, archivos] of Object.entries(KPI_FILES)) {
            nuevos[area] = await Promise.all(archivos.map(f => readExcelKPI(accessToken, area, f)));
          }
          setKpiData(nuevos); setEsDemo(false);
          setUltimaSync(new Date().toLocaleTimeString("es-EC",{hour:"2-digit",minute:"2-digit"}));
        } catch(err) {
          setError(`Error al leer OneDrive: ${err.message}`);
        } finally {
          setLoadingData(false);
        }
      }, []);

      const handleLogin = async () => {
        setLoadingAuth(true); setError(null);
        try {
          const accessToken = await msalLogin();
          const meRes = await fetch(`${GRAPH_BASE}/me`, { headers:{Authorization:`Bearer ${accessToken}`} });
          const me    = await meRes.json();
          setToken(accessToken);
          setUsuario(me.displayName || me.userPrincipalName || "Usuario");
          await cargarDatosOneDrive(accessToken);
        } catch(err) {
          setError(`Error de autenticación: ${err.message}`);
        } finally {
          setLoadingAuth(false);
        }
      };

      const handleLogout  = () => { setToken(null); setUsuario(""); setKpiData(DEMO_DATA); setEsDemo(true); setUltimaSync(null); };
      const handleRefresh = () => { if(token) cargarDatosOneDrive(token); };

      return (
        <div style={{minHeight:"100vh",background:EQ.fondoPagina,fontFamily:"'Nunito Sans',sans-serif",color:EQ.azulOscuro}}>

          {/* ── HEADER ── */}
          <div style={{background:"#FFF",borderBottom:`1px solid ${EQ.azulBorde}`,padding:"0 32px",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(27,46,75,0.08)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",height:64}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                  <circle cx="20" cy="20" r="18" stroke={EQ.turquesa} strokeWidth="2.5" fill="none"/>
                  <path d="M11 16 Q20 10 29 16" stroke={EQ.turquesa} strokeWidth="2.2" fill="none" strokeLinecap="round"/>
                  <line x1="11" y1="20" x2="29" y2="20" stroke={EQ.turquesa} strokeWidth="2.2" strokeLinecap="round"/>
                  <path d="M11 24 Q20 30 29 24" stroke={EQ.turquesa} strokeWidth="2.2" fill="none" strokeLinecap="round"/>
                </svg>
                <div>
                  <div style={{fontSize:19,fontWeight:800,color:EQ.azulOscuro,letterSpacing:"0.01em"}}>
                    EQ<span style={{color:EQ.turquesa}}>Solutions</span>
                  </div>
                  <div style={{fontSize:9.5,color:EQ.grisMedio,textTransform:"uppercase",letterSpacing:"0.15em"}}>Dashboard Ejecutivo de Indicadores</div>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                {ultimaSync && !esDemo && (
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:10,color:EQ.grisMedio}}>Última sincronización</div>
                    <div style={{fontSize:12,fontWeight:700,color:EQ.turquesa}}>{ultimaSync}</div>
                  </div>
                )}
                {token && (
                  <button onClick={handleRefresh} disabled={loadingData} title="Actualizar datos" style={{
                    background:"none",border:`1px solid ${EQ.azulBorde}`,borderRadius:8,
                    padding:"6px 10px",cursor:"pointer",color:EQ.grisMedio,fontSize:18,
                  }}>
                    <span style={{display:"inline-block",animation:loadingData?"spin 1s linear infinite":"none"}}>↻</span>
                  </button>
                )}
                {/* Badge conexión */}
                {loadingAuth ? (
                  <div style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:EQ.grisMedio}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:EQ.amarillo,animation:"pulse 1s infinite"}}/>
                    Conectando...
                  </div>
                ) : token ? (
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:EQ.verde}}>
                      <div style={{width:8,height:8,borderRadius:"50%",background:EQ.verde,boxShadow:`0 0 6px ${EQ.verde}`}}/>
                      OneDrive conectado
                    </div>
                    <span style={{fontSize:12,color:EQ.grisMedio}}>{usuario}</span>
                    <button onClick={handleLogout} style={{fontSize:11,color:EQ.grisMedio,background:"none",border:`1px solid ${EQ.azulBorde}`,borderRadius:6,padding:"3px 8px",cursor:"pointer"}}>Salir</button>
                  </div>
                ) : (
                  <button onClick={handleLogin} style={{
                    display:"flex",alignItems:"center",gap:8,
                    background:EQ.turquesa,color:"#fff",border:"none",
                    borderRadius:8,padding:"8px 16px",fontSize:13,fontWeight:700,
                    cursor:"pointer",fontFamily:"'Nunito Sans',sans-serif",
                    boxShadow:`0 2px 8px ${EQ.turquesaGlow}`,
                  }}>
                    ☁️ Conectar OneDrive
                  </button>
                )}
              </div>
            </div>
            {/* NAV */}
            <div style={{display:"flex",gap:2}}>
              {AREAS.map(area=>(
                <button key={area} onClick={()=>setActiveArea(area)} style={{
                  padding:"10px 20px",background:"transparent",border:"none",
                  borderBottom:activeArea===area?`2px solid ${EQ.turquesa}`:"2px solid transparent",
                  color:activeArea===area?EQ.turquesa:EQ.grisMedio,
                  fontFamily:"'Nunito Sans',sans-serif",fontSize:13,
                  fontWeight:activeArea===area?800:500,
                  cursor:"pointer",display:"flex",alignItems:"center",gap:6,transition:"color 0.2s",
                }}>
                  {area!=="Gerencial" && <span>{areaIcons[area]}</span>}
                  {area}
                </button>
              ))}
            </div>
          </div>

          {/* ── BANNERS ── */}
          {esDemo && !error && (
            <div style={{background:"#FFF8E1",borderBottom:"1px solid #F5C842",padding:"10px 32px",display:"flex",alignItems:"center",gap:10,fontSize:12,color:"#7A5C00"}}>
              <span>⚡</span><span><strong>Modo demo</strong> — Datos de ejemplo. Conecta OneDrive para ver tus indicadores reales.</span>
            </div>
          )}
          {loadingData && (
            <div style={{background:"#E6F7F8",borderBottom:`1px solid ${EQ.turquesa}`,padding:"10px 32px",display:"flex",alignItems:"center",gap:10,fontSize:12,color:EQ.turquesa}}>
              <span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>↻</span>
              <span>Cargando indicadores desde OneDrive...</span>
            </div>
          )}
          {error && (
            <div style={{background:"#FFF0F3",borderBottom:`1px solid ${EQ.rojo}`,padding:"10px 32px",display:"flex",alignItems:"center",justifyContent:"space-between",fontSize:12,color:EQ.rojo}}>
              <span>⚠️ {error}</span>
              <button onClick={()=>setError(null)} style={{background:"none",border:"none",color:EQ.rojo,cursor:"pointer",fontSize:14}}>✕</button>
            </div>
          )}

          {/* ── CONTENIDO ── */}
          <div style={{padding:"28px 32px"}}>
            {activeArea==="Gerencial"
              ? <GerencialView kpiData={kpiData} setArea={setActiveArea}/>
              : <AreaView area={activeArea} kpis={kpiData[activeArea]}/>
            }
          </div>

          {/* ── FOOTER ── */}
          <div style={{borderTop:`1px solid ${EQ.azulBorde}`,padding:"14px 32px",display:"flex",justifyContent:"space-between",background:"#FFF",marginTop:12}}>
            <span style={{fontSize:11,color:EQ.grisMedio}}>© 2025 EQSolutions — Información confidencial de uso interno</span>
            <span style={{fontSize:11,color:EQ.turquesa,fontWeight:700}}>
              {esDemo?"20 KPIs · 5 Áreas · Modo Demo":"20 KPIs · 5 Áreas · OneDrive"}
            </span>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>

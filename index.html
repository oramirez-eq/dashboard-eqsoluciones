// ── AUTH ──────────────────────────────────────────────────────────────────────
async function login() {
  const url = `https://login.microsoftonline.com/${MSAL.tenantId}/oauth2/v2.0/authorize`
    + `?client_id=${MSAL.clientId}&response_type=token`
    + `&redirect_uri=${encodeURIComponent(MSAL.redirectUri)}`
    + `&scope=${encodeURIComponent(MSAL.scopes)}`
    + `&response_mode=fragment&nonce=${Math.random().toString(36).slice(2)}`;
  return new Promise((res,rej) => {
    const popup = window.open(url,"msalLogin","width=520,height=660");
    const t = setInterval(()=>{
      try {
        if(popup.closed){ clearInterval(t); rej(new Error("Ventana cerrada")); return; }
        const h = popup.location.hash;
        if(h && h.includes("access_token")){
          clearInterval(t); popup.close();
          res(new URLSearchParams(h.slice(1)).get("access_token"));
        }
      } catch(_){}
    },400);
  });
}

async function handleLogin() {
  renderAuthArea("loading");
  try {
    const token = await login();
    const me = await fetch(`${GRAPH}/me`,{headers:{Authorization:`Bearer ${token}`}}).then(r=>r.json());

    state.usuario = me.displayName || me.userPrincipalName || "Usuario";
    renderAuthArea("connected");
    await loadOneDrive();
  } catch(e) {
    renderAuthArea("disconnected");
    showError("Error de autenticación: "+e.message);
  }
}

  const basePath = AREA_PATHS[area];
  if(!basePath) throw new Error(`Ruta de ${area} no configurada`);
  const path = `${basePath}/${fileName}.xlsx`;
  const url  = `${GRAPH}/users/${encodeURIComponent(DRIVE_OWNER)}/drive/root:${encodeURIComponent(path)}`;
  const item = await fetch(url,{headers:{Authorization:`Bearer ${token}`}}).then(async r=>{
    if(!r.ok) throw new Error(`No encontrado: ${fileName}.xlsx`);
    return r.json();
  });
  const rng = await fetch(`${GRAPH}/users/${encodeURIComponent(DRIVE_OWNER)}/drive/items/${item.id}/workbook/worksheets/Hoja1/usedRange`,
    {headers:{Authorization:`Bearer ${token}`}}).then(async r=>{
    if(!r.ok) throw new Error(`Error leyendo: ${fileName}`);
    return r.json();
  });
  const rows   = (rng.values||[]).slice(1).filter(r=>r[0]&&r[1]!==undefined);
  const trend  = rows.map(r=>parseFloat(r[1])||0);
  const valor  = trend[trend.length-1]??0;
  const meta   = parseFloat(rows[rows.length-1]?.[2])||0;
  const inv    = INV_KPIs.includes(fileName);
  const pct    = inv?(meta/valor):(valor/meta);
  const sem    = pct>=1?"verde":pct>=0.9?"amarillo":"rojo";
  return {...KPI_META[fileName], valor, meta, trend, semaforo:sem};
}

async function loadOneDrive() {
  document.getElementById("banner-sync").classList.remove("hidden");
  document.getElementById("banner-demo").classList.add("hidden");
  try {
    const nuevo = {};
    for(const [area,files] of Object.entries(KPI_FILES)){
      if(!AREA_PATHS[area]){ nuevo[area]=DEMO[area]; continue; }
      nuevo[area] = await Promise.all(files.map(f=>readKPI(state.token,area,f)));
    }
    state.kpiData  = nuevo;
    state.esDemo   = false;
    state.ultimaSync = new Date().toLocaleTimeString("es-EC",{hour:"2-digit",minute:"2-digit"});
    const si = document.getElementById("sync-info");
    si.classList.remove("hidden");
    si.innerHTML = `<div class="lbl">Última sincronización</div><div class="val">${state.ultimaSync}</div>`;
    document.getElementById("refresh-btn").classList.remove("hidden");
    document.getElementById("footer-right").textContent="20 KPIs · 5 Áreas · OneDrive";
  } catch(e) {
    showError("Error al leer OneDrive: "+e.message);
    document.getElementById("banner-demo").classList.remove("hidden");
  } finally {
    document.getElementById("banner-sync").classList.add("hidden");
  }
  render();
}

// ── UI HELPERS ────────────────────────────────────────────────────────────────
function showError(msg){ const b=document.getElementById("banner-error"); document.getElementById("error-text").textContent=msg; b.classList.remove("hidden"); }
function hideError(){ document.getElementById("banner-error").classList.add("hidden"); }

function renderAuthArea(s){
  const el = document.getElementById("auth-area");
  if(s==="loading") el.innerHTML=`<div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--grisMed)"><div class="dot dot-yellow"></div>Conectando...</div>`;
  else if(s==="connected") el.innerHTML=`<div class="connected-badge"><div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--verde)"><div class="dot dot-green"></div>OneDrive conectado</div><span style="font-size:12px;color:var(--grisMed)">${state.usuario}</span><button class="logout-btn" onclick="handleLogout()">Salir</button></div>`;
  else el.innerHTML=`<button class="connect-btn" onclick="handleLogin()">☁️ Conectar OneDrive</button>`;
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function renderNav(){
  const nav = document.getElementById("nav");
  nav.innerHTML = AREAS.map(a=>`
    <button class="nav-btn ${state.area===a?"active":""}" onclick="setArea('${a}')">
      ${a!=="Gerencial"?ICONS[a]:""} ${a}
    </button>`).join("");
}

function setArea(a){ state.area=a; renderNav(); renderContent(); }

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){ renderNav(); renderContent(); }

function renderContent(){
  // Destruir charts anteriores
  Object.values(state.charts).forEach(c=>c.destroy&&c.destroy());
  state.charts={};
  const el = document.getElementById("content");
  el.innerHTML = state.area==="Gerencial" ? renderGerencial() : renderArea(state.area);
  // Inicializar charts después del render
  if(state.area==="Gerencial") initBarChart();
  else initLineCharts(state.area);
}

// ── GERENCIAL ─────────────────────────────────────────────────────────────────
function renderGerencial(){
  const all   = Object.values(state.kpiData).flat();
  const total = all.length;
  const v = all.filter(k=>k.semaforo==="verde").length;
  const a = all.filter(k=>k.semaforo==="amarillo").length;
  const r = all.filter(k=>k.semaforo==="rojo").length;
  return `
    <div class="metrics-grid gap-20">
      ${[{l:"Total KPIs",val:total,c:"var(--tq)"},{l:"En Meta",val:v,c:"var(--verde)"},{l:"En Alerta",val:a,c:"var(--amarillo)"},{l:"Críticos",val:r,c:"var(--rojo)"}].map(m=>`
        <div class="metric-card">
          <div class="corner" style="background:${m.c}18"></div>
          <div class="metric-label">${m.l}</div>
          <div class="metric-value" style="color:${m.c}">${m.val}</div>
        </div>`).join("")}
    </div>
    <div class="card gap-20">
      <div style="display:flex;justify-content:space-between;margin-bottom:14px">
        <span class="section-title" style="margin:0">Salud Global del Negocio</span>
        <span style="color:var(--tq);font-size:12px;font-weight:700">${Math.round(v/total*100)}% en meta</span>
      </div>
      <div class="salud-bar">
        <div style="flex:${v};background:linear-gradient(90deg,var(--verde),#16a875)"></div>
        <div style="flex:${a};background:linear-gradient(90deg,var(--amarillo),#d4a80f)"></div>
        <div style="flex:${r};background:linear-gradient(90deg,var(--rojo),#cc2444)"></div>
      </div>
      <div class="salud-legend">
        <span style="color:var(--verde)">■ En Meta ${Math.round(v/total*100)}%</span>
        <span style="color:var(--amarillo)">■ Alerta ${Math.round(a/total*100)}%</span>
        <span style="color:var(--rojo)">■ Crítico ${Math.round(r/total*100)}%</span>
      </div>
    </div>
    <div class="gap-20">
      <div class="section-title">Resumen por Área — <span>clic para ver detalle</span></div>
      <div class="areas-grid">
        ${Object.keys(state.kpiData).map(area=>renderAreaCard(area)).join("")}
      </div>
    </div>
    <div class="card">
      <div class="section-title">Distribución de Indicadores por Área</div>
      <div class="chart-wrap"><canvas id="bar-chart"></canvas></div>
    </div>`;
}

function renderAreaCard(area){
  const kpis = state.kpiData[area];
  const v=kpis.filter(k=>k.semaforo==="verde").length;
  const a=kpis.filter(k=>k.semaforo==="amarillo").length;
  const r=kpis.filter(k=>k.semaforo==="rojo").length;
  const pct=Math.round(v/kpis.length*100);
  const pc=pct>=70?"var(--verde)":pct>=40?"var(--amarillo)":"var(--rojo)";
  return `
    <div class="area-card" onclick="setArea('${area}')">
      <div class="area-header">
        <div class="area-name">${ICONS[area]} ${area}</div>
        <span class="area-pct" style="color:${pc}">${pct}%</span>
      </div>
      <div class="area-bars">${kpis.map(k=>`<div class="area-bar" style="background:${sColor(k.semaforo)}"></div>`).join("")}</div>
      <div class="area-stats">
        <span style="color:var(--verde)">✓ ${v} OK</span>
        <span style="color:var(--amarillo)">⚡ ${a}</span>
        <span style="color:var(--rojo)">✕ ${r}</span>
      </div>
    </div>`;
}

function initBarChart(){
  const kd = state.kpiData;
  const areas = Object.keys(kd);
  const ctx = document.getElementById("bar-chart");
  if(!ctx) return;
  state.charts["bar"] = new Chart(ctx,{
    type:"bar",
    data:{
      labels:areas,
      datasets:[
        {label:"En Meta",  data:areas.map(a=>kd[a].filter(k=>k.semaforo==="verde").length),   backgroundColor:"#16A97A",borderRadius:4},
        {label:"Alerta",   data:areas.map(a=>kd[a].filter(k=>k.semaforo==="amarillo").length), backgroundColor:"#D4A012",borderRadius:4},
        {label:"Crítico",  data:areas.map(a=>kd[a].filter(k=>k.semaforo==="rojo").length),    backgroundColor:"#E03355",borderRadius:4},
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{labels:{color:"#6B87A8",font:{family:"Nunito Sans"}}}},
      scales:{
        x:{ticks:{color:"#6B87A8"},grid:{display:false}},
        y:{ticks:{color:"#6B87A8"},grid:{color:"#DDE6F0"}}
      }
    }
  });
}

// ── ÁREA ──────────────────────────────────────────────────────────────────────
function renderArea(area){
  const kpis=state.kpiData[area];
  const v=kpis.filter(k=>k.semaforo==="verde").length;
  const a=kpis.filter(k=>k.semaforo==="amarillo").length;
  const r=kpis.filter(k=>k.semaforo==="rojo").length;
  return `
    <div class="area-view-header">
      <div class="area-icon-box">${ICONS[area]}</div>
      <div>
        <div style="font-size:22px;font-weight:800;color:var(--azul)">${area}</div>
        <div style="font-size:12px;color:var(--grisMed)">${kpis.length} indicadores · ${state.esDemo?"datos demo":"datos en tiempo real"}</div>
      </div>
      <div class="area-counters">
        ${[{l:"OK",val:v,c:"var(--verde)"},{l:"Alerta",val:a,c:"var(--amarillo)"},{l:"Crítico",val:r,c:"var(--rojo)"}].map(m=>`
          <div class="area-counter">
            <div class="area-counter-val" style="color:${m.c}">${m.val}</div>
            <div class="area-counter-lbl">${m.l}</div>
          </div>`).join("")}
      </div>
    </div>
    <div class="kpi-grid">
      ${kpis.map(k=>renderKPICard(k)).join("")}
    </div>`;
}

function renderKPICard(kpi){
  const c   = sColor(kpi.semaforo);
  const pct = Math.min(Math.round(kpi.valor/kpi.meta*100),100);
  const lbl = kpi.semaforo==="verde"?"✓ OK":kpi.semaforo==="amarillo"?"⚡ ALERTA":"✕ CRÍTICO";
  return `
    <div class="kpi-card">
      <div class="kpi-stripe" style="background:${c}"></div>
      <div class="kpi-top">
        <span class="kpi-desc">${kpi.desc}</span>
        <span class="kpi-badge" style="background:${c}22;color:${c};border:1px solid ${c}55">${lbl}</span>
      </div>
      <div class="kpi-nombre">${kpi.nombre}</div>
      <div class="kpi-valor-row">
        <span class="kpi-valor" style="color:${c}">${fVal(kpi.valor,kpi.unidad)}</span>
        <span class="kpi-meta">/ meta ${fVal(kpi.meta,kpi.unidad)}</span>
      </div>
      <div class="kpi-progress">
        <div class="kpi-bar-bg"><div class="kpi-bar-fill" style="width:${pct}%;background:${c}"></div></div>
        <div class="kpi-pct">${pct}% de la meta</div>
      </div>
      <div class="kpi-chart"><canvas id="chart-${kpi.id}"></canvas></div>
    </div>`;
}

function initLineCharts(area){
  const kpis = state.kpiData[area];
  kpis.forEach(kpi=>{
    const ctx = document.getElementById(`chart-${kpi.id}`);
    if(!ctx) return;
    const c = sColor(kpi.semaforo);
    const data = (kpi.trend||[]).map((v,i)=>({x:MESES[i]||`M${i+1}`,y:v}));
    state.charts[kpi.id] = new Chart(ctx,{
      type:"line",
      data:{
        labels:data.map(d=>d.x),
        datasets:[{data:data.map(d=>d.y),borderColor:c,borderWidth:2,pointRadius:0,tension:.4,fill:false}]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{enabled:false}},
        scales:{
          x:{ticks:{color:"#6B87A8",font:{size:9}},grid:{display:false}},
          y:{display:false}
        }
      }
    });
  });
}

// ── REFRESH BTN ───────────────────────────────────────────────────────────────
document.getElementById("refresh-btn").addEventListener("click",()=>{
  if(state.token) loadOneDrive();
});

// ── INIT ──────────────────────────────────────────────────────────────────────
renderAuthArea("disconnected");
render();
</script>
</body>
</html>

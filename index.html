<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard Ejecutivo — EQSolutions</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --azul:#1A3756;--tq:#0684C6;--fondo:#F4F6F9;
      --blanco:#FFFFFF;--borde:#E0E8F0;--grisMed:#6B87A8;
      --grisLight:#EEF3F8;--verde:#16A97A;--amarillo:#D4A012;
      --rojo:#E03355;--tqGlow:rgba(6,132,198,0.12);
    }
    *{box-sizing:border-box}
    body{background:var(--fondo);font-family:'Open Sans',sans-serif;color:var(--azul);min-height:100vh}
    @keyframes spin   {from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes fadeIn {from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    @keyframes loadBar{0%{width:0%}60%{width:80%}100%{width:100%}}

    /* LOADING */
    #loading-screen{position:fixed;inset:0;background:var(--blanco);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:20px}
    .loading-bar{width:280px;height:3px;background:var(--grisLight);border-radius:2px;overflow:hidden}
    .loading-fill{height:100%;background:var(--tq);animation:loadBar 2s ease-in-out infinite}
    .loading-text{font-size:11px;color:var(--grisMed);letter-spacing:.1em;text-transform:uppercase}

    /* LOGIN */
    #login-screen{position:fixed;inset:0;background:linear-gradient(135deg,var(--azul) 0%,#0d2040 60%,#05142D 100%);display:flex;align-items:center;justify-content:center;z-index:999}
    .login-card{background:var(--blanco);border-radius:12px;padding:48px 44px;width:420px;box-shadow:0 24px 64px rgba(0,0,0,.3);animation:slideUp .5s ease}
    .login-logo{text-align:center;margin-bottom:32px}
    .login-divider{height:1px;background:var(--borde);margin:0 -44px 28px}
    .login-title{font-family:'Raleway',sans-serif;font-size:15px;font-weight:700;color:var(--azul);margin-bottom:4px}
    .login-sub{font-size:11px;color:var(--grisMed);margin-bottom:24px}
    .form-group{margin-bottom:16px}
    .form-label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--grisMed);margin-bottom:6px}
    .form-input{width:100%;padding:11px 14px;border:1.5px solid var(--borde);border-radius:6px;font-family:'Open Sans',sans-serif;font-size:13px;color:var(--azul);outline:none;transition:border-color .2s;background:var(--blanco)}
    .form-input:focus{border-color:var(--tq)}
    .form-input.error{border-color:var(--rojo)}
    .form-textarea{width:100%;padding:11px 14px;border:1.5px solid var(--borde);border-radius:6px;font-family:'Open Sans',sans-serif;font-size:13px;color:var(--azul);outline:none;resize:vertical;min-height:80px;transition:border-color .2s}
    .form-textarea:focus{border-color:var(--tq)}
    .form-select{width:100%;padding:11px 14px;border:1.5px solid var(--borde);border-radius:6px;font-family:'Open Sans',sans-serif;font-size:13px;color:var(--azul);outline:none;cursor:pointer;background:var(--blanco)}
    .form-select:focus{border-color:var(--tq)}
    .form-hint{font-size:10px;color:var(--grisMed);margin-top:4px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .login-btn{width:100%;padding:13px;background:var(--tq);color:#fff;border:none;border-radius:6px;font-family:'Open Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px}
    .login-btn:hover{background:var(--azul)}
    .login-btn:disabled{opacity:.6;cursor:not-allowed}
    .login-error{background:#FFF0F3;border:1px solid var(--rojo);border-radius:6px;padding:10px 14px;font-size:12px;color:var(--rojo);margin-bottom:16px;display:none}
    .login-footer{text-align:center;margin-top:24px;font-size:10px;color:var(--grisMed)}
    .pw-wrap{position:relative}
    .pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:14px;color:var(--grisMed)}
    .pwd-strength{height:3px;border-radius:2px;margin-top:6px;transition:all .3s;background:var(--grisLight)}

    /* HEADER */
    #header{background:var(--blanco);border-top:4px solid var(--tq);border-bottom:1px solid var(--borde);padding:0 32px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(26,55,86,.08)}
    #header-top{display:flex;justify-content:space-between;align-items:center;height:64px}
    .logo-wrap{display:flex;align-items:center;gap:12px}
    .header-sep{width:1px;height:32px;background:var(--borde);margin:0 6px}

    /* FILTROS GLOBALES en header */
    .filtros-globales{display:flex;align-items:center;gap:8px;background:var(--grisLight);border:1px solid var(--borde);border-radius:8px;padding:5px 10px}
    .filtro-label{font-size:9px;color:var(--grisMed);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap}
    .filtro-select{background:transparent;border:none;outline:none;font-family:'Open Sans',sans-serif;font-size:12px;font-weight:700;color:var(--azul);cursor:pointer;padding:0 2px}
    .filtro-sep{color:var(--borde);font-size:14px}

    .empresa-dot{width:8px;height:8px;border-radius:50%;background:var(--tq)}
    .user-badge{display:flex;align-items:center;gap:10px;background:var(--grisLight);border:1px solid var(--borde);border-radius:6px;padding:5px 12px}
    .user-avatar{width:26px;height:26px;border-radius:50%;background:var(--tq);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
    .user-name{font-weight:700;color:var(--azul);font-size:12px;white-space:nowrap}
    .user-rol{font-size:10px;color:var(--grisMed);text-transform:uppercase;letter-spacing:.06em}
    .logout-btn{background:none;border:1px solid var(--borde);border-radius:4px;padding:3px 9px;font-size:11px;color:var(--grisMed);cursor:pointer;transition:all .2s;white-space:nowrap}
    .logout-btn:hover{border-color:var(--rojo);color:var(--rojo)}

    /* NAV */
    #nav{display:flex;overflow-x:auto}
    .nav-btn{padding:10px 16px;background:transparent;border:none;border-bottom:3px solid transparent;color:var(--grisMed);font-family:'Open Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0}
    .nav-btn:hover{color:var(--azul)}
    .nav-btn.active{color:var(--tq);border-bottom-color:var(--tq);font-weight:700}
    .nav-btn.admin-tab.active{color:var(--azul);border-bottom-color:var(--azul)}
    .nav-btn.data-tab.active{color:var(--verde);border-bottom-color:var(--verde)}

    /* FILTROS POR ÁREA */
    .area-filtros{display:flex;align-items:center;gap:10px;background:var(--blanco);border:1px solid var(--borde);border-radius:8px;padding:10px 16px;margin-bottom:20px;box-shadow:0 1px 4px rgba(26,55,86,.05)}
    .area-filtro-group{display:flex;align-items:center;gap:8px}
    .area-filtro-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--grisMed)}
    .area-filtro-sel{padding:6px 12px;border:1.5px solid var(--borde);border-radius:6px;font-family:'Open Sans',sans-serif;font-size:12px;color:var(--azul);font-weight:600;outline:none;cursor:pointer;background:var(--blanco);transition:border-color .2s}
    .area-filtro-sel:focus{border-color:var(--tq)}
    .filtro-aplicar{padding:7px 16px;background:var(--tq);color:#fff;border:none;border-radius:6px;font-family:'Open Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s}
    .filtro-aplicar:hover{background:var(--azul)}
    .filtro-periodo-badge{background:var(--tqGlow);border:1px solid var(--tq);border-radius:4px;padding:4px 10px;font-size:11px;color:var(--tq);font-weight:700}

    /* BANNERS */
    .banner{padding:8px 32px;display:flex;align-items:center;gap:10px;font-size:12px}
    .banner-error  {background:#FFF0F3;border-bottom:1px solid var(--rojo);color:var(--rojo);justify-content:space-between}
    .banner-success{background:#F0FAF6;border-bottom:1px solid var(--verde);color:var(--verde)}
    .banner-error button{background:none;border:none;color:var(--rojo);cursor:pointer;font-size:15px}

    /* CONTENT */
    #content{padding:22px 32px;animation:fadeIn .3s ease}

    /* CARDS */
    .card{background:var(--blanco);border:1px solid var(--borde);border-radius:6px;padding:20px 24px;box-shadow:0 1px 4px rgba(26,55,86,.05)}

    /* METRICS */
    .metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
    .metric-card{background:var(--blanco);border:1px solid var(--borde);border-radius:6px;padding:18px 22px;border-left:4px solid var(--tq);box-shadow:0 1px 4px rgba(26,55,86,.05)}
    .metric-label{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--grisMed);margin-bottom:6px}
    .metric-value{font-size:42px;font-weight:800;font-family:'Raleway',sans-serif;line-height:1}

    /* SALUD */
    .salud-bar{display:flex;height:10px;border-radius:5px;overflow:hidden;gap:2px}
    .salud-legend{display:flex;gap:20px;margin-top:10px;font-size:12px}

    /* AREAS */
    .areas-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
    .area-card{background:var(--blanco);border:1px solid var(--borde);border-top:3px solid var(--tq);border-radius:6px;padding:16px;cursor:pointer;transition:all .2s;box-shadow:0 1px 4px rgba(26,55,86,.05)}
    .area-card:hover{border-top-color:var(--azul);box-shadow:0 4px 16px rgba(26,55,86,.12);transform:translateY(-2px)}
    .area-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .area-name{display:flex;align-items:center;gap:6px;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--azul)}
    .area-pct{font-family:'Raleway',sans-serif;font-size:20px;font-weight:800}
    .area-bars{display:flex;gap:3px;margin-bottom:10px}
    .area-bar{flex:1;height:4px;border-radius:2px}
    .area-stats{display:flex;gap:10px;font-size:10px}

    /* KPI */
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
    .kpi-card{background:var(--blanco);border:1px solid var(--borde);border-radius:6px;padding:18px 20px;position:relative;overflow:hidden;box-shadow:0 1px 4px rgba(26,55,86,.05);transition:all .25s}
    .kpi-card:hover{border-color:var(--tq);transform:translateY(-2px);box-shadow:0 6px 20px var(--tqGlow)}
    .kpi-stripe{position:absolute;top:0;left:0;width:100%;height:3px}
    .kpi-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;padding-top:5px}
    .kpi-desc{font-size:9px;color:var(--grisMed);text-transform:uppercase;letter-spacing:.06em;line-height:1.5;max-width:65%}
    .kpi-badge{font-size:8px;font-weight:700;padding:3px 8px;border-radius:3px;white-space:nowrap}
    .kpi-nombre{font-size:13px;font-weight:700;color:var(--azul);margin-bottom:8px;font-family:'Raleway',sans-serif}
    .kpi-valor-row{display:flex;align-items:baseline;gap:10px;margin-bottom:8px}
    .kpi-valor{font-size:28px;font-weight:800;font-family:'Raleway',sans-serif;line-height:1}
    .kpi-meta{font-size:11px;color:var(--grisMed)}
    .kpi-bar-bg{height:4px;background:var(--grisLight);border-radius:2px;overflow:hidden}
    .kpi-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}
    .kpi-pct{font-size:10px;color:var(--grisMed);margin-top:4px;margin-bottom:6px}
    .kpi-chart{height:44px}
    /* Botón rápido registrar en KPI */
    .kpi-reg-btn{
      display:flex;align-items:center;gap:4px;
      background:none;border:1px dashed var(--borde);border-radius:4px;
      padding:4px 9px;font-size:10px;color:var(--grisMed);
      cursor:pointer;font-family:'Open Sans',sans-serif;
      transition:all .2s;margin-top:8px;width:100%;justify-content:center;
    }
    .kpi-reg-btn:hover{border-color:var(--tq);color:var(--tq);background:var(--tqGlow)}

    /* AREA VIEW */
    .area-view-header{display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--tq);padding-bottom:14px;margin-bottom:18px}
    .area-icon-box{width:46px;height:46px;border:2px solid var(--tq);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--tqGlow)}
    .area-view-title{font-size:19px;font-weight:800;color:var(--azul);font-family:'Raleway',sans-serif}
    .area-view-sub{font-size:11px;color:var(--grisMed)}
    .area-counters{margin-left:auto;display:flex;gap:20px}
    .area-counter{text-align:center}
    .area-counter-val{font-size:26px;font-weight:800;font-family:'Raleway',sans-serif}
    .area-counter-lbl{font-size:9px;color:var(--grisMed);text-transform:uppercase;letter-spacing:.1em}

    /* TABLA */
    .tabla-detalle{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px}
    .tabla-detalle th{background:var(--grisLight);color:var(--azul);font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:10px;padding:9px 12px;text-align:left;border-bottom:2px solid var(--borde)}
    .tabla-detalle td{padding:9px 12px;border-bottom:1px solid var(--borde);color:var(--azul);vertical-align:middle}
    .tabla-detalle tr:hover td{background:var(--grisLight)}
    .estado-badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700}
    .estado-ok  {background:#16A97A22;color:#16A97A}
    .estado-warn{background:#D4A01222;color:#D4A012}
    .estado-bad {background:#E0335522;color:#E03355}

    /* INGRESO DE DATOS */
    .ingreso-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .ingreso-title{font-family:'Raleway',sans-serif;font-size:18px;font-weight:800;color:var(--azul)}
    .ingreso-sub{font-size:11px;color:var(--grisMed);margin-top:2px}
    .ingreso-tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
    .ingreso-tab{padding:9px 18px;background:var(--blanco);border:1.5px solid var(--borde);border-radius:6px;font-family:'Open Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--grisMed)}
    .ingreso-tab:hover{border-color:var(--tq);color:var(--tq)}
    .ingreso-tab.active{background:var(--tq);border-color:var(--tq);color:#fff}
    .ingreso-form{background:var(--blanco);border:1px solid var(--borde);border-radius:8px;padding:28px 32px;box-shadow:0 1px 4px rgba(26,55,86,.05);animation:fadeIn .25s ease}
    .ingreso-form-title{font-family:'Raleway',sans-serif;font-size:15px;font-weight:800;color:var(--azul);margin-bottom:4px}
    .ingreso-form-sub{font-size:11px;color:var(--grisMed);margin-bottom:22px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
    .form-full{grid-column:1/-1}
    .submit-btn{padding:12px 32px;background:var(--tq);color:#fff;border:none;border-radius:6px;font-family:'Open Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px}
    .submit-btn:hover{background:var(--azul)}
    .submit-btn:disabled{opacity:.6;cursor:not-allowed}
    .ingreso-recientes{margin-top:28px}
    .reciente-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--grisLight);border-radius:6px;margin-bottom:6px;font-size:12px}
    .reciente-icon{font-size:16px;flex-shrink:0}
    .reciente-texto{flex:1;color:var(--azul);font-weight:600}
    .reciente-fecha{color:var(--grisMed);font-size:10px;white-space:nowrap}
    .reciente-empresa{font-size:10px;color:var(--tq);font-weight:700;background:var(--tqGlow);padding:2px 8px;border-radius:3px}

    /* ADMIN */
    .admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .admin-title{font-family:'Raleway',sans-serif;font-size:18px;font-weight:800;color:var(--azul)}
    .admin-sub{font-size:11px;color:var(--grisMed);margin-top:2px}
    .admin-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
    .admin-stat{background:var(--blanco);border:1px solid var(--borde);border-radius:6px;padding:14px 18px;text-align:center;box-shadow:0 1px 4px rgba(26,55,86,.05)}
    .admin-stat-val{font-size:30px;font-weight:800;font-family:'Raleway',sans-serif}
    .admin-stat-lbl{font-size:10px;color:var(--grisMed);text-transform:uppercase;letter-spacing:.1em;margin-top:4px}
    .rol-badge{display:inline-block;padding:3px 10px;border-radius:3px;font-size:10px;font-weight:700}
    .rol-admin {background:#1A375622;color:var(--azul)}
    .rol-lider {background:#0684C622;color:var(--tq)}
    .rol-cliente{background:#6ECE8E22;color:#16A97A}
    .action-btn{background:none;border:1px solid var(--borde);border-radius:4px;padding:4px 9px;font-size:11px;cursor:pointer;font-family:'Open Sans',sans-serif;transition:all .15s;margin-right:3px}
    .action-btn:hover{background:var(--grisLight)}
    .action-btn.danger:hover{border-color:var(--rojo);color:var(--rojo)}
    .action-btn.primary{background:var(--tq);color:#fff;border-color:var(--tq)}
    .action-btn.primary:hover{background:var(--azul);border-color:var(--azul)}
    .log-accion{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700}
    .log-ok  {background:#16A97A18;color:var(--verde)}
    .log-fail{background:#E0335518;color:var(--rojo)}
    .log-admin{background:#0684C618;color:var(--tq)}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(5,20,45,.55);z-index:500;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
    .modal-box{background:var(--blanco);border-radius:10px;padding:32px 36px;width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.2);animation:slideUp .3s ease;position:relative}
    .modal-box.wide{width:600px}
    .modal-title{font-family:'Raleway',sans-serif;font-size:16px;font-weight:800;color:var(--azul);margin-bottom:4px}
    .modal-sub{font-size:11px;color:var(--grisMed);margin-bottom:20px}
    .modal-close{position:absolute;top:14px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--grisMed);line-height:1}
    .modal-close:hover{color:var(--rojo)}
    .modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:14px;border-top:1px solid var(--borde)}
    .btn-cancel{padding:9px 18px;background:none;border:1px solid var(--borde);border-radius:6px;font-family:'Open Sans',sans-serif;font-size:12px;cursor:pointer;color:var(--grisMed)}
    .btn-cancel:hover{border-color:var(--azul);color:var(--azul)}
    .btn-save{padding:9px 22px;background:var(--tq);color:#fff;border:none;border-radius:6px;font-family:'Open Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
    .btn-save:hover{background:var(--azul)}
    .btn-danger{padding:9px 22px;background:var(--rojo);color:#fff;border:none;border-radius:6px;font-family:'Open Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer}

    /* MISC */
    .chart-wrap{height:200px;position:relative}
    .section-title{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--grisMed);margin-bottom:12px;font-weight:600}
    .section-title span{color:var(--tq)}
    #footer{border-top:1px solid var(--borde);padding:10px 32px;display:flex;justify-content:space-between;align-items:center;background:var(--blanco);margin-top:12px}
    .gap-16{margin-bottom:16px}
    .hidden{display:none!important}
    .spinning{animation:spin 1s linear infinite;display:inline-block}
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <img src="Manual%20de%20marca/Logo%20EQ%20Horizontal-Color.png" height="44" alt="EQ"/>
  <div class="loading-bar"><div class="loading-fill"></div></div>
  <div class="loading-text" id="loading-text">Iniciando...</div>
</div>

<!-- LOGIN -->

async function cargarDB(){
  setLoading("Descargando base de datos...");
  try{
    const meta=await fetch(`https://api.github.com/repos/${GITHUB.owner}/${GITHUB.repo}/contents/${GITHUB.db}?ref=${GITHUB.branch}`).then(r=>r.json());
    if(!meta.download_url)throw new Error("Archivo no encontrado");
    const buf=await fetch(meta.download_url).then(r=>r.arrayBuffer());
    setLoading("Inicializando SQL...");
    SQL=await initSqlJs({locateFile:f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}`});
    DB=new SQL.Database(new Uint8Array(buf));
    return true;
  }catch(e){showError("Error cargando BD: "+e.message);return false;}
}

function queryAll(sql,params=[]){
  if(!DB)return[];
  try{
    const res=DB.exec(sql,params);
    if(!res.length)return[];
    return res[0].values.map(row=>{const o={};res[0].columns.forEach((c,i)=>o[c]=row[i]);return o;});
  }catch(e){console.error("SQL:",e.message,sql);return[];}
}

async function sha256(t){
  const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
function togglePwd(iId,bId){const i=document.getElementById(iId),b=document.getElementById(bId);if(i.type==="password"){i.type="text";b.textContent="🙈";}else{i.type="password";b.textContent="👁";}}

async function doLogin(){
  const email=document.getElementById("login-email").value.trim().toLowerCase();
  const pwd  =document.getElementById("login-pwd").value;
  const errEl=document.getElementById("login-error");
  const btn  =document.getElementById("login-btn");

  if(!email||!pwd){errEl.textContent="Completa todos los campos.";errEl.style.display="block";return;}
  btn.disabled=true;btn.textContent="Verificando...";
  const hash=await sha256(pwd);
  const rows=queryAll("SELECT u.*,e.codigo AS empresa_codigo FROM usuarios u LEFT JOIN empresas e ON e.id=u.id_empresa WHERE LOWER(u.email)=? AND u.password_hash=? AND u.activo=1",[email,hash]);
  if(!rows.length){errEl.textContent="Correo o contraseña incorrectos.";errEl.style.display="block";document.getElementById("login-pwd").classList.add("error");btn.disabled=false;btn.textContent="Ingresar";return;}

}

// ══════════════════════════════════════════════════════
// QUERIES KPI con filtros
// ══════════════════════════════════════════════════════
function getKPIResumen(){
  // Construir WHERE para período
  let where="e.codigo=?", params=[filtros.empresa];
  if(filtroPeriodo.anio>0){where+=" AND k.anio=?";params.push(filtroPeriodo.anio);}
  if(filtroPeriodo.mes>0) {where+=" AND k.mes=?"; params.push(filtroPeriodo.mes);}

  const rows=queryAll(`
    SELECT a.codigo AS area_codigo,a.icono,i.codigo AS kpi_codigo,i.nombre,i.unidad,i.descripcion,i.tipo_meta,
           k.valor,k.meta,k.semaforo,k.anio,k.mes
    FROM kpi_mensual k
    JOIN empresas e    ON e.id=k.id_empresa
    JOIN indicadores i ON i.id=k.id_indicador
    JOIN areas a       ON a.id=i.id_area
    WHERE ${where}
    GROUP BY i.codigo HAVING k.anio=MAX(k.anio) AND k.mes=MAX(k.mes)
    ORDER BY a.codigo,i.codigo
  `,params);

  const res={};
  rows.forEach(r=>{
    if(!res[r.area_codigo])res[r.area_codigo]=[];
    res[r.area_codigo].push({...r,trend:getTrend(r.kpi_codigo)});
  });
  return res;
}

function getTrend(kpiCodigo){
  let where="i.codigo=? AND e.codigo=?",params=[kpiCodigo,filtros.empresa];
  if(filtroPeriodo.anio>0){where+=" AND k.anio=?";params.push(filtroPeriodo.anio);}
  return queryAll(`SELECT k.mes,k.valor FROM kpi_mensual k JOIN indicadores i ON i.id=k.id_indicador JOIN empresas e ON e.id=k.id_empresa WHERE ${where} ORDER BY k.anio ASC,k.mes ASC LIMIT 12`,params).map(r=>({label:MESES_C[r.mes],valor:r.valor}));
}

function buildFiltroPeriodoUI(){
  const anios=queryAll("SELECT DISTINCT anio FROM kpi_mensual ORDER BY anio DESC");
  const aniosSel=`<option value="0">Todos</option>`+anios.map(a=>`<option value="${a.anio}" ${a.anio===filtroPeriodo.anio?"selected":""}>${a.anio}</option>`).join("");
  const mesSel=MESES_N.map((m,i)=>`<option value="${i}" ${i===filtroPeriodo.mes?"selected":""}>${m}</option>`).join("");
  const label=filtroPeriodo.anio===0?"Todos los períodos":(filtroPeriodo.mes===0?`Año ${filtroPeriodo.anio}`:`${MESES_N[filtroPeriodo.mes]} ${filtroPeriodo.anio}`);
  return`<div class="area-filtros">
    <span style="font-size:14px">🗓</span>
    <div class="area-filtro-group"><span class="area-filtro-lbl">Año:</span><select id="fp-anio" class="area-filtro-sel">${aniosSel}</select></div>
    <div class="area-filtro-group"><span class="area-filtro-lbl">Mes:</span><select id="fp-mes" class="area-filtro-sel">${mesSel}</select></div>
    <button class="filtro-aplicar" onclick="aplicarFiltroPeriodo()">Aplicar</button>
    <div class="filtro-periodo-badge">📍 ${label}</div>
    <span style="font-size:11px;color:var(--grisMed);margin-left:auto">Los filtros del header también aplican globalmente</span>
  </div>`;
}

// ══════════════════════════════════════════════════════
// GERENCIAL
// ══════════════════════════════════════════════════════
function renderGerencial(){
  const kpis=getKPIResumen(),all=Object.values(kpis).flat(),total=all.length;
  const periodoLabel=filtroPeriodo.anio===0?"todos los períodos":(filtroPeriodo.mes===0?`año ${filtroPeriodo.anio}`:`${MESES_N[filtroPeriodo.mes]} ${filtroPeriodo.anio}`);
  if(!total)return`<div class="card" style="text-align:center;padding:48px"><div style="font-size:32px;margin-bottom:12px">📊</div><div style="font-size:16px;font-weight:700">Sin datos para ${filtros.empresa}</div><div style="font-size:12px;color:var(--grisMed);margin-top:8px">No hay indicadores en el período seleccionado.</div></div>`;
  const v=all.filter(k=>k.semaforo==="verde").length,a=all.filter(k=>k.semaforo==="amarillo").length,r=all.filter(k=>k.semaforo==="rojo").length;
  const emp=queryAll("SELECT nombre,ciudad FROM empresas WHERE codigo=?",[filtros.empresa])[0];
  return`
  ${buildFiltroPeriodoUI()}
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div><div style="font-size:18px;font-weight:800;font-family:'Raleway',sans-serif">${emp?.nombre||filtros.empresa}</div>
    <div style="font-size:11px;color:var(--grisMed)">${emp?.ciudad||""} · Vista ejecutiva · ${periodoLabel}</div></div>
    <div style="font-size:10px;color:var(--grisMed);text-align:right">Última actualización<br><span style="color:var(--tq);font-weight:700">${new Date().toLocaleDateString('es-EC',{year:'numeric',month:'long'})}</span></div>
  </div>
  <div class="metrics-grid gap-16">${[{l:"Total KPIs",val:total,c:"var(--tq)"},{l:"En Meta",val:v,c:"var(--verde)"},{l:"En Alerta",val:a,c:"var(--amarillo)"},{l:"Críticos",val:r,c:"var(--rojo)"}].map(m=>`<div class="metric-card"><div class="metric-label">${m.l}</div><div class="metric-value" style="color:${m.c}">${m.val}</div></div>`).join("")}</div>
  <div class="card gap-16" style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span class="section-title" style="margin:0">Salud Global</span><span style="color:var(--tq);font-size:12px;font-weight:700">${Math.round(v/total*100)}% en meta</span></div>
  <div class="salud-bar"><div style="flex:${v};background:var(--verde)"></div><div style="flex:${a};background:var(--amarillo)"></div><div style="flex:${r};background:var(--rojo)"></div></div>
  <div class="salud-legend"><span style="color:var(--verde)">■ Meta ${Math.round(v/total*100)}%</span><span style="color:var(--amarillo)">■ Alerta ${Math.round(a/total*100)}%</span><span style="color:var(--rojo)">■ Crítico ${Math.round(r/total*100)}%</span></div></div>
  <div style="margin-bottom:16px"><div class="section-title">Por Área — <span>clic para detalle</span></div><div class="areas-grid">${AREAS.filter(x=>x!=="Gerencial").map(area=>{const ak=kpis[area]||[];const av=ak.filter(k=>k.semaforo==="verde").length,aa=ak.filter(k=>k.semaforo==="amarillo").length,ar=ak.filter(k=>k.semaforo==="rojo").length,pct=ak.length?Math.round(av/ak.length*100):0,pc=pct>=70?"var(--verde)":pct>=40?"var(--amarillo)":"var(--rojo)";return`<div class="area-card" onclick="setArea('${area}')"><div class="area-header"><div class="area-name">${ICONOS[area]} ${area}</div><span class="area-pct" style="color:${pc}">${ak.length?pct+"%":"—"}</span></div><div class="area-bars">${ak.map(k=>`<div class="area-bar" style="background:${sc(k.semaforo)}"></div>`).join("")||`<div style="font-size:10px;color:var(--grisMed)">Sin datos</div>`}</div><div class="area-stats"><span style="color:var(--verde)">✓${av}</span><span style="color:var(--amarillo)">⚡${aa}</span><span style="color:var(--rojo)">✕${ar}</span></div></div>`;}).join("")}</div></div>
  <div class="card"><div class="section-title">Distribución por Área</div><div class="chart-wrap"><canvas id="bar-chart"></canvas></div></div>`;
}

function initBarChart(){
  const kpis=getKPIResumen(),areas=AREAS.filter(a=>a!=="Gerencial"),ctx=document.getElementById("bar-chart");if(!ctx)return;
  charts["bar"]=new Chart(ctx,{type:"bar",data:{labels:areas,datasets:[{label:"En Meta",data:areas.map(a=>(kpis[a]||[]).filter(k=>k.semaforo==="verde").length),backgroundColor:"#16A97A",borderRadius:3},{label:"Alerta",data:areas.map(a=>(kpis[a]||[]).filter(k=>k.semaforo==="amarillo").length),backgroundColor:"#D4A012",borderRadius:3},{label:"Crítico",data:areas.map(a=>(kpis[a]||[]).filter(k=>k.semaforo==="rojo").length),backgroundColor:"#E03355",borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#6B87A8",font:{family:"Open Sans",size:11}}}},scales:{x:{ticks:{color:"#6B87A8"},grid:{display:false}},y:{ticks:{color:"#6B87A8",stepSize:1},grid:{color:"#E0E8F0"}}}}});
}

function renderArea(area){
  const kpis=getKPIResumen(),ak=kpis[area]||[];
  const v=ak.filter(k=>k.semaforo==="verde").length,a=ak.filter(k=>k.semaforo==="amarillo").length,r=ak.filter(k=>k.semaforo==="rojo").length;
  const estadoClass=s=>s==="Atendido"||s==="Completada"?"estado-ok":s==="En progreso"?"estado-warn":"estado-bad";

  // Filtros de detalle para solicitudes/eventos/actividades
  let whereDetalle="id_empresa=(SELECT id FROM empresas WHERE codigo=?)",paramsD=[filtros.empresa];
  if(filtroPeriodo.anio>0&&area==="TICs"){whereDetalle+=" AND anio=?";paramsD.push(filtroPeriodo.anio);}
  if(filtroPeriodo.mes>0&&area==="TICs"){
    const mesNombre=MESES_N[filtroPeriodo.mes];
    whereDetalle+=" AND mes=?";paramsD.push(mesNombre);
  }

  const sol=area==="TICs"?queryAll(`SELECT numero,mes,anio,fecha_solicitud,descripcion,solicitante,area_solicitante,estado,tipo_servicio FROM solicitudes_tic WHERE ${whereDetalle} ORDER BY fecha_solicitud DESC LIMIT 25`,paramsD):[];
  const evt=area==="TICs"?queryAll(`SELECT fecha_evento,semana,horas_desconexion,descripcion,causa FROM eventos_internet WHERE ${whereDetalle.replace("mes=?","mes=?")} ORDER BY fecha_evento DESC LIMIT 20`,[filtros.empresa,...(filtroPeriodo.anio>0?[filtroPeriodo.anio]:[])]):[];
  const act=area==="TICs"?queryAll(`SELECT prioridad,tema,descripcion,estado,ROUND(avance_pct*100) AS avance,fecha_inicio,fecha_fin,trimestre FROM actividades_tic WHERE id_empresa=(SELECT id FROM empresas WHERE codigo=?) ORDER BY fecha_inicio DESC LIMIT 25`,[filtros.empresa]):[];

  const periodoLabel=filtroPeriodo.anio===0?"todos los períodos":(filtroPeriodo.mes===0?`año ${filtroPeriodo.anio}`:`${MESES_N[filtroPeriodo.mes]} ${filtroPeriodo.anio}`);
  const puedeIngresar=["eq_admin","eq_lider"].includes(sesion?.rol);

  return`
  ${buildFiltroPeriodoUI()}
  <div class="area-view-header">
    <div class="area-icon-box">${ICONOS[area]}</div>
    <div><div class="area-view-title">${area}</div><div class="area-view-sub">${ak.length} indicadores · ${periodoLabel}</div></div>
    <div class="area-counters">${[{l:"OK",val:v,c:"var(--verde)"},{l:"Alerta",val:a,c:"var(--amarillo)"},{l:"Crítico",val:r,c:"var(--rojo)"}].map(m=>`<div class="area-counter"><div class="area-counter-val" style="color:${m.c}">${m.val}</div><div class="area-counter-lbl">${m.l}</div></div>`).join("")}</div>
  </div>
  ${ak.length?`<div class="kpi-grid" style="margin-bottom:24px">${ak.map(k=>{const c=sc(k.semaforo||"rojo"),pct=k.meta?Math.min(Math.round(Math.abs(k.valor/k.meta)*100),100):0,lbl=k.semaforo==="verde"?"✓ EN META":k.semaforo==="amarillo"?"⚡ ALERTA":"✕ CRÍTICO";
    const btnReg=puedeIngresar&&area==="TICs"?`<button class="kpi-reg-btn" onclick="abrirRegistroRapido('${k.kpi_codigo}','${k.nombre}')">＋ Registrar nuevo dato</button>`:"";
    return`<div class="kpi-card"><div class="kpi-stripe" style="background:${c}"></div><div class="kpi-top"><span class="kpi-desc">${k.descripcion||""}</span><span class="kpi-badge" style="background:${c}18;color:${c};border:1px solid ${c}40">${lbl}</span></div><div class="kpi-nombre">${k.nombre}</div><div class="kpi-valor-row"><span class="kpi-valor" style="color:${c}">${fv(k.valor,k.unidad)}</span><span class="kpi-meta">meta: ${fv(k.meta,k.unidad)}</span></div><div><div class="kpi-bar-bg"><div class="kpi-bar-fill" style="width:${pct}%;background:${c}"></div></div><div class="kpi-pct">${pct}% · período: ${MESES_C[k.mes]||"—"} ${k.anio||""}</div></div><div class="kpi-chart"><canvas id="ch-${k.kpi_codigo}"></canvas></div>${btnReg}</div>`;}).join("")}</div>`
  :`<div class="card" style="text-align:center;padding:36px;margin-bottom:16px"><div style="font-size:24px;margin-bottom:8px">${ICONOS[area]}</div><div style="font-weight:700;margin-bottom:4px">${area} — Sin datos en el período seleccionado</div><div style="font-size:12px;color:var(--grisMed)">Ajusta los filtros de período o ingresa nuevos datos.</div></div>`}

              ${MESES_N.slice(1).map(m=>`<th style="background:var(--azul);color:#fff;padding:7px 8px;text-align:center;border:1px solid var(--borde);font-size:10px;white-space:nowrap">${m.slice(0,3)}</th>`).join("")}

          </thead>

            ${["Pendiente","En progreso","Atendido"].map((estado,ei)=>{
              const bgRow = ei===2?"#f0faf6":ei===1?"#fffbea":"#fafafa";

                ${MESES_N.slice(1).map(mes=>{
                  const anioFiltro = filtroPeriodo.anio>0?filtroPeriodo.anio:2025;
                  const cnt = queryAll("SELECT COUNT(*) AS c FROM solicitudes_tic WHERE id_empresa=(SELECT id FROM empresas WHERE codigo=?) AND anio=? AND mes=? AND estado=?",[filtros.empresa,anioFiltro,mes,estado])[0]?.c||0;
                  return `<td style="padding:6px 8px;border:1px solid var(--borde);text-align:center;background:${bgRow};color:${cnt>0?colorRow:"var(--grisMed)"}">${cnt||0}</td>`;

            </tr>
            <!-- Fila % -->
            <tr>
              <td style="padding:5px 10px;border:1px solid var(--borde);font-size:10px;color:var(--tq);background:#EBF6FB"></td>
              ${MESES_N.slice(1).map(mes=>{
                const anioFiltro = filtroPeriodo.anio>0?filtroPeriodo.anio:2025;
                const total  = queryAll("SELECT COUNT(*) AS c FROM solicitudes_tic WHERE id_empresa=(SELECT id FROM empresas WHERE codigo=?) AND anio=? AND mes=?",[filtros.empresa,anioFiltro,mes])[0]?.c||0;
                const atend  = queryAll("SELECT COUNT(*) AS c FROM solicitudes_tic WHERE id_empresa=(SELECT id FROM empresas WHERE codigo=?) AND anio=? AND mes=? AND estado='Atendido'",[filtros.empresa,anioFiltro,mes])[0]?.c||0;
                const pct    = total>0?Math.round(atend/total*100):null;
                const color  = pct===100?"var(--verde)":pct>=85?"var(--amarillo)":pct!==null?"var(--rojo)":"var(--grisMed)";
                return `<td style="padding:5px 8px;border:1px solid var(--borde);text-align:center;font-weight:700;color:${color};background:#EBF6FB;font-size:10px">${pct!==null?pct+"%":""}</td>`;
              }).join("")}
            </tr>
          </tbody>
        </table>
        <!-- Acumulado -->
        ${(()=>{
          const anioFiltro = filtroPeriodo.anio>0?filtroPeriodo.anio:2025;
          const total = queryAll("SELECT COUNT(*) AS c FROM solicitudes_tic WHERE id_empresa=(SELECT id FROM empresas WHERE codigo=?) AND anio=?",[filtros.empresa,anioFiltro])[0]?.c||0;
          return `<div style="display:inline-flex;margin-top:10px;border:1px solid var(--borde);border-radius:4px;overflow:hidden;font-size:11px">
            <div style="background:var(--azul);color:#fff;padding:5px 12px;font-weight:700">Acumulado ${anioFiltro}</div>
            <div style="background:var(--grisLight);padding:5px 16px;font-weight:800;color:var(--tq)">${total} solicitudes</div>
          </div>`;
        })()}
      </div>
    </div>
    <!-- Pie chart del período seleccionado -->
    <div class="card" style="display:flex;flex-direction:column;align-items:center">
      <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--azul);text-align:center;margin-bottom:4px">
        Solicitudes — ${filtroPeriodo.mes>0?MESES_N[filtroPeriodo.mes].toUpperCase():"AÑO "+(filtroPeriodo.anio>0?filtroPeriodo.anio:"COMPLETO")}
      </div>
      <div style="position:relative;width:200px;height:200px;margin:8px auto">
        <canvas id="pie-solicitudes"></canvas>
      </div>
      <div style="font-size:10px;color:var(--grisMed);margin-top:4px;text-align:center" id="pie-sol-legend"></div>
    </div>
  </div>

  <!-- Fila 2: Barras apiladas mensuales -->
  <div class="card gap-16" style="margin-bottom:16px">
    <div class="section-title">Solicitudes de Usuarios Mensuales — <span>${filtroPeriodo.anio>0?filtroPeriodo.anio:"Histórico"}</span></div>
    <div style="height:240px;position:relative"><canvas id="bar-solicitudes"></canvas></div>
  </div>

  <!-- Fila 3: Tablas detalle -->
  <div class="card gap-16" style="margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div class="section-title" style="margin:0">Bitácora de Solicitudes <span style="color:var(--grisMed)">(${sol.length})</span></div>
      ${puedeIngresar?`<button class="action-btn primary" onclick="setArea('Datos');setTimeout(()=>setIngresoTab('ticket'),50)">＋ Nueva Solicitud</button>`:""}
    </div>
    <div style="overflow-x:auto"><table class="tabla-detalle"><thead><tr><th>#</th><th>Fecha</th><th>Descripción</th><th>Solicitante</th><th>Área</th><th>Servicio</th><th>Estado</th></tr></thead>
    <tbody>${sol.map(s=>`<tr><td>${s.numero||"—"}</td><td>${s.fecha_solicitud||"—"}</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${s.descripcion||""}">${s.descripcion||"—"}</td><td>${s.solicitante||"—"}</td><td>${s.area_solicitante||"—"}</td><td>${s.tipo_servicio||"—"}</td><td><span class="estado-badge ${estadoClass(s.estado)}">${s.estado||"—"}</span></td></tr>`).join("")||`<tr><td colspan="7" style="text-align:center;color:var(--grisMed);padding:16px">Sin registros en el período</td></tr>`}</tbody></table></div>
  </div>

  <!-- Eventos de Conectividad -->
  <div class="card gap-16" style="margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div class="section-title" style="margin:0">Eventos de Conectividad <span style="color:var(--grisMed)">(${evt.length})</span>
        ${(()=>{const tot=queryAll("SELECT SUM(horas_desconexion) AS t FROM eventos_internet WHERE id_empresa=(SELECT id FROM empresas WHERE codigo=?) AND anio=?",[filtros.empresa,filtroPeriodo.anio>0?filtroPeriodo.anio:2025])[0]?.t||0; return tot>0?`<span style="color:var(--rojo);font-weight:700;margin-left:8px">· ${tot}h total desconexión</span>`:`<span style="color:var(--verde);font-weight:700;margin-left:8px">· Sin desconexiones</span>`;})()}
      </div>
      ${puedeIngresar?`<button class="action-btn primary" onclick="setArea('Datos');setTimeout(()=>setIngresoTab('evento'),50)">＋ Nuevo Evento</button>`:""}
    </div>
    <div style="overflow-x:auto"><table class="tabla-detalle"><thead><tr><th>Fecha</th><th>Semana</th><th>Descripción</th><th>Hrs Desc.</th><th>Causa</th></tr></thead>
    <tbody>${evt.length>0?evt.map(e=>`<tr><td>${e.fecha_evento||"—"}</td><td>${e.semana||"—"}</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${e.descripcion||""}">${e.descripcion||"—"}</td><td><span style="font-weight:700;color:${e.horas_desconexion>5?"var(--rojo)":e.horas_desconexion>2?"var(--amarillo)":"var(--verde)"}">${e.horas_desconexion}h</span></td><td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.causa||"—"}</td></tr>`).join(""):`<tr><td colspan="5" style="text-align:center;padding:16px"><span style="color:var(--verde);font-weight:700">✓ Sin eventos de desconexión en el período — Servicio al 100%</span></td></tr>`}</tbody></table></div>
  </div>

  <!-- Proyectos y Actividades -->
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div class="section-title" style="margin:0">Proyectos y Actividades TIC <span style="color:var(--grisMed)">(${act.length})</span>

      </div>
      ${puedeIngresar?`<button class="action-btn primary" onclick="setArea('Datos');setTimeout(()=>setIngresoTab('actividad'),50)">＋ Nueva Actividad</button>`:""}
    </div>
    <div style="overflow-x:auto"><table class="tabla-detalle"><thead><tr><th>Prio.</th><th>Tema</th><th>Descripción</th><th>Inicio</th><th>Fin</th><th>Avance</th><th>Estado</th></tr></thead>
    <tbody>${act.map(a=>`<tr><td><span style="font-weight:700;color:${a.prioridad==="A"?"var(--rojo)":a.prioridad==="B"?"var(--amarillo)":"var(--tq)"}">${a.prioridad||"—"}</span></td><td>${a.tema||"—"}</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${a.descripcion||""}">${a.descripcion||"—"}</td><td>${a.fecha_inicio||"—"}</td><td>${a.fecha_fin||"—"}</td><td><div style="display:flex;align-items:center;gap:6px"><div style="width:56px;height:4px;background:var(--grisLight);border-radius:2px;overflow:hidden"><div style="width:${a.avance||0}%;height:100%;background:${a.estado==="Completada"?"var(--verde)":"var(--tq)"}"></div></div><span style="font-size:10px">${a.avance||0}%</span></div></td><td><span class="estado-badge ${estadoClass(a.estado)}">${a.estado||"—"}</span></td></tr>`).join("")||`<tr><td colspan="7" style="text-align:center;color:var(--grisMed);padding:16px">Sin actividades</td></tr>`}</tbody></table></div>
  </div>`:""}`;
}

function initChartsKPI(area){
  (getKPIResumen()[area]||[]).forEach(k=>{
    const ctx=document.getElementById(`ch-${k.kpi_codigo}`);if(!ctx||!k.trend?.length)return;
    const c=sc(k.semaforo||"rojo");
    charts[k.kpi_codigo]=new Chart(ctx,{type:"line",data:{labels:k.trend.map(t=>t.label),datasets:[{data:k.trend.map(t=>t.valor),borderColor:c,borderWidth:2,pointRadius:0,tension:.4,fill:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{ticks:{color:"#6B87A8",font:{size:9}},grid:{display:false}},y:{display:false}}}});
  });
  if(area==="TICs") setTimeout(()=>initChartsTICs(),80);
}

function initChartsTICs(){
  const anioFiltro = filtroPeriodo.anio>0?filtroPeriodo.anio:2025;
  const mesFiltro  = filtroPeriodo.mes>0?filtroPeriodo.mes:0;
  const empCodigo  = filtros.empresa;

  // ── PIE CHART: distribución del período seleccionado ──────────
  const ctxPie = document.getElementById("pie-solicitudes");
  if(ctxPie){
    // Si hay mes → ese mes; si no → todo el año
    let whereP = "id_empresa=(SELECT id FROM empresas WHERE codigo=?) AND anio=?";
    let paramsP = [empCodigo, anioFiltro];
    if(mesFiltro>0){ whereP+=" AND mes=?"; paramsP.push(MESES_N[mesFiltro]); }

    const atendidos  = queryAll(`SELECT COUNT(*) AS c FROM solicitudes_tic WHERE ${whereP} AND estado='Atendido'`,   paramsP)[0]?.c||0;
    const enProgreso = queryAll(`SELECT COUNT(*) AS c FROM solicitudes_tic WHERE ${whereP} AND estado='En progreso'`,paramsP)[0]?.c||0;
    const pendientes = queryAll(`SELECT COUNT(*) AS c FROM solicitudes_tic WHERE ${whereP} AND estado='Pendiente'`,  paramsP)[0]?.c||0;
    const totalPie   = atendidos+enProgreso+pendientes;

    charts["pie-sol"] = new Chart(ctxPie, {
      type:"doughnut",
      data:{
        labels:["Atendido","En progreso","Pendiente"],
        datasets:[{
          data:[atendidos,enProgreso,pendientes],
          backgroundColor:["#16A97A","#D4A012","#6B87A8"],
          borderWidth:2, borderColor:"#fff",
          hoverOffset:8
        }]
      },
      options:{
        responsive:true, maintainAspectRatio:true, cutout:"55%",
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.raw} (${totalPie?Math.round(ctx.raw/totalPie*100):0}%)`}}
        }
      }
    });

    // Leyenda personalizada
    const leg = document.getElementById("pie-sol-legend");
    if(leg){
      const data = [{l:"Atendido",v:atendidos,c:"#16A97A"},{l:"En progreso",v:enProgreso,c:"#D4A012"},{l:"Pendiente",v:pendientes,c:"#6B87A8"}];
      leg.innerHTML = data.map(d=>`<div style="display:inline-flex;align-items:center;gap:5px;margin:3px 8px">
        <div style="width:10px;height:10px;border-radius:50%;background:${d.c}"></div>
        <span style="font-weight:700;color:${d.c}">${d.l} ${d.v}</span>
        <span style="color:var(--grisMed)">${totalPie?Math.round(d.v/totalPie*100):0}%</span>
      </div>`).join("");
    }
  }

  // ── BARRAS APILADAS: solicitudes mensuales del año ────────────
  const ctxBar = document.getElementById("bar-solicitudes");
  if(ctxBar){
    const mesesLabels = MESES_N.slice(1);
    const dataPend=[], dataProgr=[], dataAten=[], dataTotal=[];

    mesesLabels.forEach(mes=>{
      const where = "id_empresa=(SELECT id FROM empresas WHERE codigo=?) AND anio=? AND mes=?";
      const params = [empCodigo, anioFiltro, mes];
      const at = queryAll(`SELECT COUNT(*) AS c FROM solicitudes_tic WHERE ${where} AND estado='Atendido'`,   params)[0]?.c||0;
      const pr = queryAll(`SELECT COUNT(*) AS c FROM solicitudes_tic WHERE ${where} AND estado='En progreso'`,params)[0]?.c||0;
      const pe = queryAll(`SELECT COUNT(*) AS c FROM solicitudes_tic WHERE ${where} AND estado='Pendiente'`,  params)[0]?.c||0;
      dataAten.push(at); dataProgr.push(pr); dataPend.push(pe);
      dataTotal.push(at+pr+pe);
    });

    charts["bar-sol"] = new Chart(ctxBar,{
      type:"bar",
      data:{
        labels: mesesLabels,
        datasets:[
          {label:"Pendiente",  data:dataPend,  backgroundColor:"#6B87A8", borderRadius:2, stack:"s"},
          {label:"En progreso",data:dataProgr, backgroundColor:"#D4A012", borderRadius:2, stack:"s"},
          {label:"Atendido",   data:dataAten,  backgroundColor:"#16A97A", borderRadius:2, stack:"s"},
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{
          legend:{position:"bottom",labels:{color:"#6B87A8",font:{family:"Open Sans",size:11},boxWidth:12,padding:16}},
          tooltip:{callbacks:{
            afterTitle: items=>{
              const idx=items[0].dataIndex;
              const tot=dataTotal[idx];
              return tot>0?`Total: ${tot}`:"";
            }
          }},
          // Etiquetas de total sobre cada barra
          datalabels: false
        },
        scales:{
          x:{ticks:{color:"#6B87A8",font:{size:10}},grid:{display:false}},
          y:{ticks:{color:"#6B87A8",stepSize:5},grid:{color:"#E0E8F0"},beginAtZero:true}
        }
      },
      // Plugin inline para mostrar total sobre barras
      plugins:[{
        id:"totalLabel",
        afterDatasetsDraw(chart){
          const{ctx,data,scales:{x,y}}=chart;
          ctx.save();
          data.labels.forEach((_,i)=>{
            let sum=0;
            chart.data.datasets.forEach(ds=>sum+=(ds.data[i]||0));
            if(sum===0) return;
            const bar=chart.getDatasetMeta(chart.data.datasets.length-1).data[i];
            ctx.font="bold 11px 'Open Sans'";
            ctx.fillStyle="#1A3756";
            ctx.textAlign="center";
            ctx.fillText(sum, bar.x, bar.y-5);
          });
          ctx.restore();
        }
      }]
    });
  }
}

function renderIngresoDatos(){
  const empresas=queryAll("SELECT id,codigo,nombre FROM empresas WHERE codigo!='EQSOLUTIONS' AND activo=1");
  const empOptions=empresas.map(e=>`<option value="${e.id}" ${e.codigo===filtros.empresa?"selected":""}>${e.nombre} (${e.codigo})</option>`).join("");

function getEmpresaId(selectId){
  const v=document.getElementById(selectId)?.value;
  return v?parseInt(v):null;
}

function guardarEvento(){
  const empId=getEmpresaId("ie-empresa");
  const fecha=document.getElementById("ie-fecha")?.value;
  const semana=document.getElementById("ie-semana")?.value||"";
  const mes=document.getElementById("ie-mes")?.value||"";
  const anio=parseInt(document.getElementById("ie-anio")?.value||2025);
  const horas=parseFloat(document.getElementById("ie-horas")?.value||0);
  const desc=document.getElementById("ie-desc")?.value.trim();
  const informa=document.getElementById("ie-informa")?.value.trim();
  const resp=document.getElementById("ie-responsable")?.value.trim()||"Líder TIC";
  const causa=document.getElementById("ie-causa")?.value.trim();
  if(!fecha||!desc){showError("Fecha y descripción son obligatorios.");return;}
  DB.run(`INSERT INTO eventos_internet(id_empresa,numero,semana,mes,anio,fecha_evento,descripcion,informante,horas_desconexion,responsable,causa) VALUES(?,NULL,?,?,?,?,?,?,?,?,?)`,
    [empId,semana,MESES_N[parseInt(mes)],anio,fecha,desc,informa,horas,resp,causa]);
  recalcularKPIInternet(empId,anio,parseInt(mes));
  showSuccess("✓ Evento de desconexión registrado correctamente");
  limpiarForm(["ie-desc","ie-semana","ie-horas","ie-informa","ie-causa"]);
  renderContent();
}

function guardarTicket(){
  const empId=getEmpresaId("it-empresa");
  const fecha=document.getElementById("it-fecha")?.value;
  const mes=document.getElementById("it-mes")?.value;
  const anio=parseInt(document.getElementById("it-anio")?.value||2025);
  const desc=document.getElementById("it-desc")?.value.trim();
  const solic=document.getElementById("it-solicitante")?.value.trim();
  const area=document.getElementById("it-area")?.value.trim();
  const serv=document.getElementById("it-servicio")?.value;
  const estado=document.getElementById("it-estado")?.value;
  const resp=document.getElementById("it-responsable")?.value.trim()||"Líder TIC";
  const fechaAten=document.getElementById("it-fecha-aten")?.value;
  const obs=document.getElementById("it-obs")?.value.trim();
  if(!fecha||!desc||!solic){showError("Fecha, descripción y solicitante son obligatorios.");return;}
  const mesNombre=MESES_N[parseInt(mes)];
  const numActual=queryAll("SELECT MAX(numero) AS n FROM solicitudes_tic WHERE id_empresa=? AND anio=?",[empId,anio])[0]?.n||0;
  DB.run(`INSERT INTO solicitudes_tic(id_empresa,numero,mes,anio,fecha_solicitud,descripcion,solicitante,area_solicitante,responsable,estado,fecha_atencion,tipo_servicio,observacion) VALUES(?,?,?,?,?,?,?,?,?,?,?,?,?)`,
    [empId,numActual+1,mesNombre,anio,fecha,desc,solic,area,resp,estado,fechaAten||null,serv,obs]);
  recalcularKPIAtencion(empId,anio,parseInt(mes));
  showSuccess("✓ Ticket de atención registrado correctamente");
  limpiarForm(["it-desc","it-solicitante","it-area","it-obs"]);
  renderContent();
}

function guardarActividad(){

    [empId,trim,mesNombre,prio,tema,desc,inicio,fin,resp,estado,avance,obs]);

// ══════════════════════════════════════════════════════
// RECÁLCULO AUTOMÁTICO DE KPIs
// ══════════════════════════════════════════════════════
function recalcularKPIInternet(empId,anio,mes){
  const total=720; // horas del mes
  const horas=queryAll("SELECT SUM(horas_desconexion) AS t FROM eventos_internet WHERE id_empresa=? AND anio=? AND mes=?",[empId,anio,MESES_N[mes]])[0]?.t||0;
  const efectividad=Math.round(((total-horas)/total)*1000)/10;
  const meta=99.5;
  const semaforo=efectividad>=99?"verde":efectividad>=98?"amarillo":"rojo";
  const indId=queryAll("SELECT id FROM indicadores WHERE codigo='TIC-003'",[0])[0]?.id;
  if(!indId)return;
  DB.run("INSERT OR REPLACE INTO kpi_mensual(id_empresa,id_indicador,anio,mes,valor,meta,semaforo) VALUES(?,?,?,?,?,?,?)",[empId,indId,anio,mes,efectividad,meta,semaforo]);
}

function recalcularKPIAtencion(empId,anio,mes){
  const mesNombre=MESES_N[mes];
  const total=queryAll("SELECT COUNT(*) AS t FROM solicitudes_tic WHERE id_empresa=? AND anio=? AND mes=?",[empId,anio,mesNombre])[0]?.t||0;
  const atendidos=queryAll("SELECT COUNT(*) AS t FROM solicitudes_tic WHERE id_empresa=? AND anio=? AND mes=? AND estado='Atendido'",[empId,anio,mesNombre])[0]?.t||0;
  if(!total)return;
  const pct=Math.round(atendidos/total*1000)/10;
  const meta=90;
  const semaforo=pct>=95?"verde":pct>=85?"amarillo":"rojo";
  const indId=queryAll("SELECT id FROM indicadores WHERE codigo='TIC-002'",[0])[0]?.id;
  if(!indId)return;
  DB.run("INSERT OR REPLACE INTO kpi_mensual(id_empresa,id_indicador,anio,mes,valor,meta,semaforo) VALUES(?,?,?,?,?,?,?)",[empId,indId,anio,mes,pct,meta,semaforo]);
}

function recalcularKPIActividades(empId,anio,mes){
  const total=queryAll("SELECT COUNT(*) AS t FROM actividades_tic WHERE id_empresa=? AND SUBSTR(fecha_inicio,1,4)=?",[empId,""+anio])[0]?.t||0;
  const comp=queryAll("SELECT COUNT(*) AS t FROM actividades_tic WHERE id_empresa=? AND SUBSTR(fecha_inicio,1,4)=? AND estado='Completada'",[empId,""+anio])[0]?.t||0;
  if(!total)return;
  const pct=Math.round(comp/total*1000)/10;
  const meta=95;
  const semaforo=pct>=95?"verde":pct>=85?"amarillo":"rojo";
  const indId=queryAll("SELECT id FROM indicadores WHERE codigo='TIC-001'",[0])[0]?.id;
  if(!indId)return;
  DB.run("INSERT OR REPLACE INTO kpi_mensual(id_empresa,id_indicador,anio,mes,valor,meta,semaforo) VALUES(?,?,?,?,?,?,?)",[empId,indId,anio,mes,pct,meta,semaforo]);
}

    <div class="section-title">Usuarios del Sistema</div>
    <div style="overflow-x:auto"><table class="tabla-detalle"><thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Empresa</th><th>Último Acceso</th><th>Estado</th><th>Acciones</th></tr></thead>
    <tbody>${usuarios.map(u=>`<tr style="${u.activo?"":"opacity:.6"}"><td><div style="display:flex;align-items:center;gap:9px"><div style="width:30px;height:30px;border-radius:50%;background:${u.activo?"var(--tq)":"#ccc"};color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0">${u.nombre.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase()}</div><span style="font-weight:600">${u.nombre}</span></div></td>
    <td style="color:var(--grisMed);font-size:11px">${u.email}</td><td>${rolBadge(u.rol)}</td><td>${u.empresa_nombre||`<span style="color:var(--grisMed);font-style:italic">EQ Internal</span>`}</td>
    <td style="color:var(--grisMed);font-size:11px">${u.ultimo_acceso?.slice(0,16)||"Nunca"}</td><td><span class="estado-badge ${u.activo?"estado-ok":"estado-bad"}">${u.activo?"Activo":"Inactivo"}</span></td>
    <td style="white-space:nowrap"><button class="action-btn" onclick="modalEditarUsuario(${u.id})">✏</button><button class="action-btn" onclick="modalResetPwd(${u.id},'${u.email}')">🔑</button><button class="action-btn danger" onclick="toggleUsuario(${u.id},${u.activo},'${u.nombre}')">${u.activo?"⊘":"✓"}</button></td></tr>`).join("")}
    </tbody></table></div>
  </div>
  <div class="card"><div class="section-title">Log de Accesos</div>
  <div style="overflow-x:auto"><table class="tabla-detalle"><thead><tr><th>Usuario</th><th>Acción</th><th>Detalle</th><th>IP</th><th>Fecha</th></tr></thead>
  <tbody>${logs.map(l=>`<tr><td style="font-weight:600">${l.email}</td><td>${logBadge(l.accion)}</td><td style="color:var(--grisMed);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.detalle||"—"}</td><td style="color:var(--grisMed);font-family:monospace;font-size:11px">${l.ip||"—"}</td><td style="color:var(--grisMed);font-size:11px">${l.creado_en?.slice(0,16)||"—"}</td></tr>`).join("")||`<tr><td colspan="5" style="text-align:center;color:var(--grisMed);padding:16px">Sin registros</td></tr>`}
  </tbody></table></div></div>`;
}

// MODALES ADMIN
function getEmpresas2(){return queryAll("SELECT id,codigo,nombre FROM empresas WHERE codigo!='EQSOLUTIONS' AND activo=1");}

function modalCrearUsuario(){
  const emps=getEmpresas2();
  openModal(`<div class="modal-box"><button class="modal-close" onclick="closeModal()">✕</button>
  <div class="modal-title">＋ Nuevo Usuario</div><div class="modal-sub">Completa los datos del nuevo usuario</div>
  <div class="form-group"><label class="form-label">Nombre completo</label><input type="text" id="m-nombre" class="form-input" placeholder="Juan Pérez"/></div>
  <div class="form-group"><label class="form-label">Correo electrónico</label><input type="email" id="m-email" class="form-input" placeholder="usuario@empresa.com"/></div>
  <div class="form-group"><label class="form-label">Rol</label><select id="m-rol" class="form-select" onchange="onRolChange('m-rol','m-emp-grp')"><option value="eq_admin">Administrador EQ</option><option value="eq_lider">Líder EQ</option><option value="cliente" selected>Cliente</option></select></div>
  <div class="form-group" id="m-emp-grp"><label class="form-label">Empresa cliente</label><select id="m-empresa" class="form-select">${emps.map(e=>`<option value="${e.id}">${e.nombre} (${e.codigo})</option>`).join("")}</select></div>
  <div class="form-group"><label class="form-label">Contraseña temporal</label><div class="pw-wrap"><input type="password" id="m-pwd" class="form-input" placeholder="Mín. 8 caracteres" oninput="checkPwdStrength('m-pwd','m-str')"/><button class="pw-toggle" onclick="togglePwd('m-pwd','m-pe')" id="m-pe">👁</button></div><div class="pwd-strength" id="m-str"></div></div>
  <div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">Cancelar</button><button class="btn-save" onclick="guardarNuevoUsuario()">Crear</button></div></div>`);
}

function onRolChange(selId,grpId){const r=document.getElementById(selId)?.value,g=document.getElementById(grpId);if(g)g.style.display=r==="cliente"?"block":"none";}

async function guardarNuevoUsuario(){
  const nombre=document.getElementById("m-nombre")?.value.trim(),email=document.getElementById("m-email")?.value.trim().toLowerCase(),rol=document.getElementById("m-rol")?.value,pwd=document.getElementById("m-pwd")?.value;
  const empId=rol==="cliente"?parseInt(document.getElementById("m-empresa")?.value):null;
  if(!nombre||!email||!pwd){showError("Completa todos los campos.");return;}
  if(pwd.length<8){showError("Contraseña mínimo 8 caracteres.");return;}
  if(queryAll("SELECT id FROM usuarios WHERE email=?",[email]).length){showError("Email ya registrado.");return;}
  const hash=await sha256(pwd);
  DB.run("INSERT INTO usuarios(nombre,email,rol,id_empresa,password_hash,activo,creado_por) VALUES(?,?,?,?,?,1,?)",[nombre,email,rol,empId,hash,sesion.email]);
  DB.run("INSERT INTO log_accesos(email,accion,detalle) VALUES(?,?,?)",[sesion.email,"user_created",`Creó ${email}`]);
  closeModal();showSuccess(`✓ Usuario ${nombre} creado`);renderContent();
}

function checkPwdStrength(iId,bId){
  const v=document.getElementById(iId)?.value||"";
  const s=[v.length>=8,/[A-Z]/.test(v),/[0-9]/.test(v),/[^A-Za-z0-9]/.test(v)].filter(Boolean).length;
  const b=document.getElementById(bId);if(!b)return;
  b.style.width=(s*25)+"%";b.style.background=["var(--rojo)","var(--rojo)","var(--amarillo)","var(--verde)","var(--verde)"][s];
}

function modalEditarUsuario(id){
  const u=queryAll("SELECT * FROM usuarios WHERE id=?",[id])[0];if(!u)return;
  const emps=getEmpresas2();
  openModal(`<div class="modal-box"><button class="modal-close" onclick="closeModal()">✕</button>
  <div class="modal-title">✏ Editar Usuario</div><div class="modal-sub">${u.email}</div>
  <div class="form-group"><label class="form-label">Nombre</label><input type="text" id="e-nombre" class="form-input" value="${u.nombre||""}"/></div>
  <div class="form-group"><label class="form-label">Rol</label><select id="e-rol" class="form-select" onchange="onRolChange('e-rol','e-emp-grp')"><option value="eq_admin" ${u.rol==="eq_admin"?"selected":""}>Administrador EQ</option><option value="eq_lider" ${u.rol==="eq_lider"?"selected":""}>Líder EQ</option><option value="cliente" ${u.rol==="cliente"?"selected":""}>Cliente</option></select></div>
  <div class="form-group" id="e-emp-grp" style="display:${u.rol==="cliente"?"block":"none"}"><label class="form-label">Empresa</label><select id="e-empresa" class="form-select">${emps.map(e=>`<option value="${e.id}" ${u.id_empresa===e.id?"selected":""}>${e.nombre} (${e.codigo})</option>`).join("")}</select></div>
  <div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">Cancelar</button><button class="btn-save" onclick="guardarEdicion(${id})">Guardar</button></div></div>`);
}

function guardarEdicion(id){
  const nombre=document.getElementById("e-nombre")?.value.trim(),rol=document.getElementById("e-rol")?.value;
  const empId=rol==="cliente"?parseInt(document.getElementById("e-empresa")?.value):null;
  if(!nombre){showError("El nombre es obligatorio.");return;}
  DB.run("UPDATE usuarios SET nombre=?,rol=?,id_empresa=? WHERE id=?",[nombre,rol,empId,id]);
  DB.run("INSERT INTO log_accesos(email,accion,detalle) VALUES(?,?,?)",[sesion.email,"user_edited",`Editó usuario id ${id}`]);
  closeModal();showSuccess("✓ Usuario actualizado");renderContent();
}

function modalResetPwd(id,email){
  openModal(`<div class="modal-box"><button class="modal-close" onclick="closeModal()">✕</button>
  <div class="modal-title">🔑 Reset Contraseña</div><div class="modal-sub">${email}</div>
  <div class="form-group"><label class="form-label">Nueva contraseña</label><div class="pw-wrap"><input type="password" id="r-pwd" class="form-input" placeholder="Mín. 8 caracteres" oninput="checkPwdStrength('r-pwd','r-str')"/><button class="pw-toggle" onclick="togglePwd('r-pwd','r-eye')" id="r-eye">👁</button></div><div class="pwd-strength" id="r-str"></div></div>
  <div class="form-group"><label class="form-label">Confirmar</label><input type="password" id="r-pwd2" class="form-input" placeholder="Repite la contraseña"/></div>
  <div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">Cancelar</button><button class="btn-save" onclick="guardarResetPwd(${id},'${email}')">Restablecer</button></div></div>`);
}

async function guardarResetPwd(id,email){
  const pwd=document.getElementById("r-pwd")?.value,pwd2=document.getElementById("r-pwd2")?.value;
  if(!pwd||pwd.length<8){showError("Mínimo 8 caracteres.");return;}
  if(pwd!==pwd2){showError("Las contraseñas no coinciden.");return;}
  const hash=await sha256(pwd);
  DB.run("UPDATE usuarios SET password_hash=? WHERE id=?",[hash,id]);
  DB.run("INSERT INTO log_accesos(email,accion,detalle) VALUES(?,?,?)",[sesion.email,"pwd_reset",`Reset pwd: ${email}`]);
  closeModal();showSuccess(`✓ Contraseña restablecida para ${email}`);
}

function toggleUsuario(id,activo,nombre){
  openModal(`<div class="modal-box" style="width:400px"><button class="modal-close" onclick="closeModal()">✕</button>
  <div class="modal-title">${activo?"⊘ Desactivar":"✓ Activar"}</div>
  <div style="font-size:13px;color:var(--azul);margin:12px 0">¿Confirmas <strong>${activo?"desactivar":"activar"}</strong> a <strong>${nombre}</strong>?</div>
  <div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">Cancelar</button><button class="${activo?"btn-danger":"btn-save"}" onclick="confirmarToggle(${id},${activo},'${nombre}')">${activo?"Desactivar":"Activar"}</button></div></div>`);
}

function confirmarToggle(id,activo,nombre){
  const nuevo=activo?0:1;
  DB.run("UPDATE usuarios SET activo=? WHERE id=?",[nuevo,id]);
  DB.run("INSERT INTO log_accesos(email,accion,detalle) VALUES(?,?,?)",[sesion.email,"user_edited",`${nuevo?"Activó":"Desactivó"}: ${nombre}`]);
  closeModal();showSuccess(`✓ Usuario ${nuevo?"activado":"desactivado"}`);renderContent();
}

// INIT
// ══════════════════════════════════════════════════════
async function init(){
  const ok=await cargarDB();
  hideLoading();
  if(ok){document.getElementById("login-screen").classList.remove("hidden");}
  else{document.getElementById("login-screen").classList.remove("hidden");document.getElementById("login-error").textContent="⚠ Error al conectar con la base de datos.";document.getElementById("login-error").style.display="block";}
}
init();
</script>
